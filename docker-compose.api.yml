services:
  mini-bop-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: mini-bop-api
    env_file:
      - docker/env/mini-bop.env.example
    environment:
      SPARK_HOME: /usr/local/lib/python3.12/site-packages/pyspark
      MINI_BOP_PROJECT_ROOT: /app
      MINI_BOP_HDFS_BASE: hdfs://host.docker.internal:9000/data/mini_bop
      MINI_BOP_API_PORT: 8010
    ports:
      - "8010:8010"
    volumes:
      - ./monitoring:/app/monitoring:ro      
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
